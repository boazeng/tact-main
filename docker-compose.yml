services:
  tact-main:
    build: .
    container_name: tact-main
    restart: unless-stopped
    ports:
      - "127.0.0.1:8099:8000"   # localhost only — the Cloudflare Tunnel connects locally
    env_file:
      - .env                    # Google OAuth + session secret (never in git)
    volumes:
      - ./database:/app/database   # config.json (shared app list) + auth.db (users) survive restarts
