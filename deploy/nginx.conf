# nginx config INSIDE the container — serves the built Vite SPA.
# TLS is terminated by Cloudflare at the edge; the tunnel hits this on plain HTTP.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # health check for the deploy curl
    location = /healthz {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # hashed Vite assets — cache forever (filenames change on every build)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must NEVER be cached, or browsers keep loading an old build
    # that points at stale (already-purged) JS/CSS hashes.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    # SPA fallback — any unknown route returns index.html.
    # no-cache here too, since "/" and client routes are served as index.html.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
