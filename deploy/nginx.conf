# nginx config INSIDE the container — serves the built Vite SPA.
# TLS is terminated by Cloudflare at the edge; the tunnel hits this on plain HTTP.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # health check for the deploy curl
    location = /healthz {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # hashed Vite assets — cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — any unknown route returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
